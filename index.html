<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LiveAssist AI</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --bg-soft: #f5f5f7;
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: #e5e5ea;
        --accent: #5e5ce6;
        --accent-strong: #4846c9;
        --teal: #21a89a;
        --surface: #ffffff;
        --mockup: #1c1c1e;
        --mockup-line: rgba(255, 255, 255, 0.13);
        --shadow: 0 22px 70px rgba(29, 29, 31, 0.1);
        --shadow-soft: 0 10px 30px rgba(29, 29, 31, 0.08);
        --radius: 16px;
        --max: 1180px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body.menu-open {
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      :focus-visible {
        outline: 3px solid rgba(94, 92, 230, 0.42);
        outline-offset: 3px;
      }

      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        border-bottom: 1px solid transparent;
        background: rgba(255, 255, 255, 0);
        transition:
          background 180ms ease-out,
          border-color 180ms ease-out,
          box-shadow 180ms ease-out;
      }

      .site-header.is-scrolled,
      .site-header.menu-visible {
        border-color: rgba(229, 229, 234, 0.88);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.65) inset;
        backdrop-filter: blur(20px);
      }

      .nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 24px;
        width: min(var(--max), calc(100% - 40px));
        height: 64px;
        margin: 0 auto;
      }

      .logo {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .desktop-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      .nav-link {
        min-height: 40px;
        border-radius: 999px;
        padding: 12px 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 560;
        transition:
          color 120ms ease-out,
          background 120ms ease-out;
      }

      .nav-link:hover {
        background: rgba(94, 92, 230, 0.08);
        color: var(--accent);
      }

      .nav-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .lang-toggle,
      .menu-toggle {
        display: inline-flex;
        min-width: 44px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .menu-toggle {
        display: none;
        gap: 4px;
        flex-direction: column;
      }

      .menu-toggle span {
        width: 17px;
        height: 2px;
        border-radius: 2px;
        background: var(--text);
        transition:
          transform 180ms ease-out,
          opacity 180ms ease-out;
      }

      .menu-open .menu-toggle span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      .menu-open .menu-toggle span:nth-child(2) {
        opacity: 0;
      }

      .menu-open .menu-toggle span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }

      .mobile-panel {
        display: none;
      }

      .button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0 20px;
        font-size: 15px;
        font-weight: 650;
        line-height: 1;
        transition:
          transform 150ms ease-out,
          border-color 120ms ease-out,
          background 120ms ease-out,
          color 120ms ease-out,
          box-shadow 120ms ease-out;
      }

      .button-primary {
        background: var(--accent);
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(94, 92, 230, 0.24);
      }

      .button-primary:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .button-secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.76);
        color: var(--text);
      }

      .button-secondary:hover {
        border-color: rgba(94, 92, 230, 0.38);
        color: var(--accent);
        transform: translateY(-1px);
      }

      main {
        overflow: clip;
      }

      .section {
        padding: 112px 20px;
      }

      .section-soft {
        background: var(--bg-soft);
      }

      .container {
        width: min(var(--max), 100%);
        margin: 0 auto;
      }

      .hero {
        min-height: 100svh;
        padding: 132px 20px 88px;
        display: flex;
        align-items: center;
        background:
          radial-gradient(circle at 82% 22%, rgba(94, 92, 230, 0.12), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, #fbfbfd 78%, #f5f5f7 100%);
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.72fr);
        align-items: center;
        gap: 64px;
      }

      .eyebrow {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 760;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 780px;
        margin-bottom: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
        font-size: clamp(48px, 7vw, 86px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.96;
      }

      .hero-copy {
        max-width: 650px;
        margin-bottom: 32px;
        color: var(--muted);
        font-size: 21px;
        line-height: 1.45;
      }

      .hero-actions,
      .cta-form-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .mockup-wrap {
        position: relative;
        min-height: 520px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .mockup-halo {
        position: absolute;
        width: min(560px, 94vw);
        aspect-ratio: 1;
        border-radius: 999px;
        background:
          radial-gradient(circle, rgba(94, 92, 230, 0.18), transparent 62%),
          radial-gradient(circle at 32% 28%, rgba(33, 168, 154, 0.16), transparent 38%);
        filter: blur(4px);
      }

      .overlay-card {
        position: relative;
        width: min(520px, 100%);
        border: 1px solid var(--mockup-line);
        border-radius: var(--radius);
        background: var(--mockup);
        color: #f5f5f7;
        box-shadow:
          0 30px 90px rgba(29, 29, 31, 0.28),
          0 1px 0 rgba(255, 255, 255, 0.08) inset;
        overflow: hidden;
      }

      .hero .overlay-card {
        animation: float-card 4s ease-in-out infinite;
      }

      .overlay-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 84% 18%, rgba(94, 92, 230, 0.25), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 38%);
        pointer-events: none;
      }

      .overlay-inner {
        position: relative;
        padding: 18px;
      }

      .overlay-top {
        display: flex;
        min-height: 36px;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
        color: rgba(245, 245, 247, 0.74);
        font-size: 12px;
        font-weight: 650;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #34c759;
        box-shadow: 0 0 0 5px rgba(52, 199, 89, 0.12);
      }

      .overlay-block {
        border: 1px solid var(--mockup-line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.055);
        padding: 16px;
      }

      .overlay-block + .overlay-block {
        margin-top: 12px;
      }

      .overlay-label {
        margin-bottom: 8px;
        color: rgba(245, 245, 247, 0.58);
        font-size: 12px;
        font-weight: 720;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .question-line,
      .answer-line {
        min-height: 52px;
        margin-bottom: 0;
        font-size: 17px;
        line-height: 1.5;
      }

      .typing-caret::after {
        content: "";
        display: inline-block;
        width: 2px;
        height: 1em;
        margin-left: 2px;
        vertical-align: -0.15em;
        background: #f5f5f7;
        animation: caret 900ms steps(2, start) infinite;
      }

      .answer-block,
      .source-line {
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 260ms ease-out,
          transform 260ms ease-out;
      }

      .answer-block.is-visible,
      .source-line.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .source-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
        color: rgba(245, 245, 247, 0.62);
        font-size: 13px;
        line-height: 1.45;
      }

      .source-icon {
        color: #d1d1d6;
      }

      .scrolly {
        position: relative;
        min-height: 500svh;
        background: #ffffff;
      }

      .scrolly-stage {
        position: sticky;
        top: 0;
        height: 100svh;
        display: grid;
        place-items: center;
        padding: 88px 20px;
        overflow: hidden;
      }

      .pulse-bg {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0.52;
        pointer-events: none;
      }

      .wave {
        width: min(740px, 90vw);
        height: 220px;
      }

      .wave path {
        fill: none;
        stroke: rgba(94, 92, 230, 0.16);
        stroke-width: 2;
        animation: wave-pulse 2400ms ease-in-out infinite;
      }

      .scrolly-content {
        position: relative;
        width: min(860px, 100%);
        text-align: center;
      }

      .scrolly-step {
        display: none;
        opacity: 0;
        transform: translateY(18px);
      }

      .scrolly-step.is-active {
        display: block;
        opacity: 1;
        transform: translateY(0);
        animation: step-in 320ms ease-out both;
      }

      .scrolly-copy {
        margin: 0 auto;
        max-width: 820px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
        font-size: clamp(42px, 7vw, 78px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.02;
      }

      .scrolly-sub {
        margin: 18px auto 0;
        max-width: 620px;
        color: var(--muted);
        font-size: 21px;
        line-height: 1.45;
      }

      .scrolly-icon {
        display: inline-grid;
        width: 72px;
        height: 72px;
        place-items: center;
        margin-bottom: 24px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #ffffff;
        box-shadow: var(--shadow-soft);
        color: var(--accent);
      }

      .key-pop {
        display: inline-flex;
        min-width: 136px;
        height: 92px;
        align-items: center;
        justify-content: center;
        margin-bottom: 26px;
        border: 1px solid #d7d7de;
        border-bottom-width: 7px;
        border-radius: 24px;
        background: linear-gradient(180deg, #ffffff, #f5f5f7);
        box-shadow: 0 18px 50px rgba(29, 29, 31, 0.12);
        color: var(--text);
        font-size: 34px;
        font-weight: 760;
        animation: key-pop 900ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .scrolly-mockup {
        max-width: 560px;
        margin: 0 auto 24px;
      }

      .section-head {
        max-width: 780px;
        margin: 0 auto 56px;
        text-align: center;
      }

      .section-head h2 {
        margin-bottom: 18px;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.04;
      }

      .section-head p {
        margin-bottom: 0;
        color: var(--muted);
        font-size: 19px;
        line-height: 1.55;
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .feature-card,
      .price-card,
      .use-tile,
      .faq-item,
      .step-card {
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow-soft);
      }

      .feature-card {
        min-height: 238px;
        border-radius: var(--radius);
        padding: 28px;
      }

      .line-icon {
        width: 46px;
        height: 46px;
        margin-bottom: 26px;
        color: var(--teal);
      }

      .feature-card h3,
      .step-card h3,
      .price-card h3 {
        margin-bottom: 10px;
        font-size: 21px;
        line-height: 1.16;
      }

      .feature-card p,
      .step-card p,
      .price-card p {
        margin-bottom: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .steps {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .steps::before {
        content: "";
        position: absolute;
        top: 38px;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, #d7d7de, transparent);
      }

      .step-card {
        position: relative;
        border-radius: var(--radius);
        padding: 26px;
      }

      .step-number {
        display: inline-flex;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        margin-bottom: 34px;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-size: 13px;
        font-weight: 760;
      }

      .use-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .use-tile {
        display: flex;
        min-height: 112px;
        align-items: center;
        gap: 14px;
        border-radius: var(--radius);
        padding: 20px;
        font-weight: 680;
      }

      .use-tile svg {
        flex: 0 0 auto;
        color: var(--accent);
      }

      .pricing-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .price-card {
        position: relative;
        border-radius: var(--radius);
        padding: 30px;
      }

      .price-card.is-highlighted {
        border-color: rgba(94, 92, 230, 0.62);
        box-shadow:
          0 0 0 1px rgba(94, 92, 230, 0.22) inset,
          0 24px 70px rgba(94, 92, 230, 0.16);
      }

      .popular-badge {
        position: absolute;
        top: 24px;
        right: 24px;
        border-radius: 999px;
        background: rgba(94, 92, 230, 0.1);
        color: var(--accent);
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 760;
      }

      .price {
        display: flex;
        min-height: 58px;
        align-items: baseline;
        gap: 4px;
        margin: 20px 0 12px;
      }

      .price-value {
        font-size: 45px;
        font-weight: 760;
        letter-spacing: 0;
      }

      .price-period {
        color: var(--muted);
        font-size: 15px;
      }

      .price-features {
        display: grid;
        gap: 13px;
        margin: 28px 0 30px;
        padding: 0;
        list-style: none;
      }

      .price-features li {
        display: flex;
        gap: 10px;
        color: var(--text);
        font-size: 15px;
        line-height: 1.45;
      }

      .price-features svg {
        margin-top: 2px;
        color: var(--teal);
        flex: 0 0 auto;
      }

      .faq-list {
        max-width: 860px;
        margin: 0 auto;
      }

      .faq-item {
        border-radius: 14px;
        overflow: hidden;
      }

      .faq-item + .faq-item {
        margin-top: 12px;
      }

      .faq-trigger {
        display: flex;
        width: 100%;
        min-height: 68px;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border: 0;
        background: transparent;
        color: var(--text);
        padding: 18px 22px;
        text-align: left;
        font-size: 18px;
        font-weight: 680;
      }

      .faq-trigger svg {
        flex: 0 0 auto;
        transition: transform 180ms ease-out;
      }

      .faq-trigger[aria-expanded="true"] svg {
        transform: rotate(45deg);
      }

      .faq-panel {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 220ms ease-out;
      }

      .faq-panel[aria-hidden="false"] {
        grid-template-rows: 1fr;
      }

      .faq-answer {
        overflow: hidden;
      }

      .faq-answer p {
        margin: 0;
        padding: 0 22px 22px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .cta-section {
        text-align: center;
      }

      .cta-box {
        max-width: 860px;
        margin: 0 auto;
      }

      .cta-box h2 {
        margin-bottom: 18px;
        font-size: clamp(42px, 6vw, 70px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.03;
      }

      .waitlist-form {
        display: grid;
        gap: 10px;
        max-width: 620px;
        margin: 34px auto 12px;
      }

      .cta-form-row {
        align-items: stretch;
        justify-content: center;
      }

      .field {
        min-width: min(330px, 100%);
        flex: 1 1 300px;
      }

      .field label {
        display: block;
        margin: 0 0 7px 4px;
        color: var(--text);
        font-size: 13px;
        font-weight: 680;
        text-align: left;
      }

      .field input {
        width: 100%;
        min-height: 52px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        color: var(--text);
        padding: 0 18px;
        font-size: 16px;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.84) inset;
      }

      .field input::placeholder {
        color: #86868b;
      }

      .form-message,
      .cta-sub {
        min-height: 22px;
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .form-message.is-error {
        color: #b42318;
      }

      .form-message.is-success {
        color: #067647;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 28px 20px;
        background: #ffffff;
      }

      .footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .footer-brand {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 14px;
      }

      .footer-brand strong {
        color: var(--text);
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .footer-links a {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
      }

      .reveal {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 300ms ease-out,
          transform 300ms ease-out;
      }

      .reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes float-card {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-12px);
        }
      }

      @keyframes caret {
        0%,
        49% {
          opacity: 1;
        }

        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes step-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes key-pop {
        0% {
          opacity: 0;
          transform: translateY(26px) scale(0.9);
        }

        60% {
          opacity: 1;
          transform: translateY(-4px) scale(1.04);
        }

        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes wave-pulse {
        0%,
        100% {
          opacity: 0.45;
          transform: translateX(-8px);
        }

        50% {
          opacity: 1;
          transform: translateX(8px);
        }
      }

      @media (max-width: 980px) {
        .nav {
          grid-template-columns: auto 1fr auto;
          width: min(100% - 28px, var(--max));
        }

        .desktop-nav,
        .nav-actions .button {
          display: none;
        }

        .menu-toggle {
          display: inline-flex;
        }

        .mobile-panel {
          position: fixed;
          top: 64px;
          left: 0;
          right: 0;
          display: grid;
          gap: 6px;
          padding: 18px 20px 24px;

        plus: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
        chat: '<svg width="36" height="36" viewBox="0 0 48 48" fill="none" aria-hidden="true"><path d="M10 13a7 7 0 0 1 7-7h14a7 7 0 0 1 7 7v9a7 7 0 0 1-7 7H20l-9 8v-8h-1V13Z" stroke="currentColor" stroke-width="2"/><path d="M18 17h12M18 23h8" stroke="currentColor" stroke-width="2"/></svg>'
      };

      const useIcons = ["🎓", "✈️", "✚", "⚙", "⌂", "▣", "☏", "◇"];
      const featureIcons = ["doc", "source", "overlay", "key", "mic", "privacy"];
      const navLinks = [
        ["navHow", "#how-it-works"],
        ["navUseCases", "#use-cases"],
        ["navPricing", "#pricing"],
        ["navFaq", "#faq"]
      ];

      let currentLang = localStorage.getItem("liveassist-lang") || "en";
      let activeStep = 0;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const typedNodes = [];

      function t(key) {
        return strings[currentLang][key];
      }

      function setText(selector, text) {
        document.querySelectorAll(selector).forEach((node) => {
          node.textContent = text;
        });
      }

      function renderNav() {
        const desktop = document.querySelector("[data-nav-links]");
        const mobile = document.querySelector("[data-mobile-panel]");
        const items = navLinks.map(([key, href]) => `<a class="nav-link" href="${href}" data-menu-link>${t(key)}</a>`).join("");
        desktop.innerHTML = items;
        mobile.innerHTML = `${items}<a class="button button-primary" href="#waitlist" data-menu-link>${t("joinWaitlist")}</a>`;
      }

      function overlayMarkup() {
        return `
          <article class="overlay-card" aria-label="LiveAssist AI product mockup">
            <div class="overlay-inner">
              <div class="overlay-top">
                <span data-overlay-header>${t("overlayHeader")}</span>
                <span class="status-dot" aria-hidden="true"></span>
              </div>
              <div class="overlay-block">
                <div class="overlay-label" data-overlay-question-label>${t("overlayQuestionLabel")}</div>
                <p class="question-line typing-caret" data-typing-question></p>
              </div>
              <div class="overlay-block answer-block" data-answer-block>
                <div class="overlay-label" data-overlay-answer-label>${t("overlayAnswerLabel")}</div>
                <p class="answer-line" data-overlay-answer>${t("overlayAnswer")}</p>
              </div>
              <div class="source-line" data-source-line>
                <span class="source-icon" aria-hidden="true">📄</span>
                <span data-overlay-source>${t("overlaySource").replace("📄 ", "")}</span>
              </div>
            </div>
          </article>
        `;
      }

      function renderOverlays() {
        document.querySelectorAll("[data-overlay-mockup]").forEach((node) => {
          node.innerHTML = overlayMarkup();
        });
        typedNodes.length = 0;
        document.querySelectorAll("[data-typing-question]").forEach((node) => typedNodes.push(node));
        runTypingCycle();
      }

      function renderFeatures() {
        document.querySelector("[data-features]").innerHTML = t("features").map((item, index) => `
          <article class="feature-card reveal">
            ${icons[featureIcons[index]]}
            <h3>${item[0]}</h3>
            <p>${item[1]}</p>
          </article>
        `).join("");
      }

      function renderSteps() {
        document.querySelector("[data-steps]").innerHTML = t("steps").map((item, index) => `
          <article class="step-card reveal">
            <span class="step-number">${String(index + 1).padStart(2, "0")}</span>
            <h3>${item[0]}</h3>
            <p>${item[1]}</p>
          </article>
        `).join("");
      }

      function renderUseCases() {
        document.querySelector("[data-use-cases]").innerHTML = t("useCases").map((item, index) => `
          <article class="use-tile reveal">
            <span aria-hidden="true">${useIcons[index]}</span>
            <span>${item}</span>
          </article>
        `).join("");
      }

      function renderPricing() {
        document.querySelector("[data-pricing]").innerHTML = t("pricing").map((plan) => `
          <article class="price-card reveal ${plan.highlighted ? "is-highlighted" : ""}">
            ${plan.highlighted ? `<span class="popular-badge">${t("popular")}</span>` : ""}
            <h3>${plan.name}</h3>
            <div class="price">
              <span class="price-value">${plan.price}</span>
              <span class="price-period">${plan.period}</span>
            </div>
            <p>${plan.description}</p>
            <ul class="price-features">
              ${plan.features.map((feature) => `<li>${icons.check}<span>${feature}</span></li>`).join("")}
            </ul>
            <a class="button ${plan.highlighted ? "button-primary" : "button-secondary"}" href="#waitlist">${t("heroPrimary")}</a>
          </article>
        `).join("");
      }

      function renderFaq() {
        document.querySelector("[data-faq]").innerHTML = t("faqs").map((item, index) => `
          <article class="faq-item reveal">
            <button class="faq-trigger" type="button" aria-expanded="${index === 0 ? "true" : "false"}" aria-controls="faq-${index}" data-faq-trigger>
              <span>${item[0]}</span>
              ${icons.plus}
            </button>
            <div class="faq-panel" id="faq-${index}" aria-hidden="${index === 0 ? "false" : "true"}">
              <div class="faq-answer"><p>${item[1]}</p></div>
            </div>
          </article>
        `).join("");
      }

      function bindFaq() {
        document.querySelectorAll("[data-faq-trigger]").forEach((button) => {
          button.addEventListener("click", () => {
            const panel = document.getElementById(button.getAttribute("aria-controls"));
            const willOpen = button.getAttribute("aria-expanded") !== "true";
            document.querySelectorAll("[data-faq-trigger]").forEach((trigger) => trigger.setAttribute("aria-expanded", "false"));
            document.querySelectorAll(".faq-panel").forEach((item) => item.setAttribute("aria-hidden", "true"));
            button.setAttribute("aria-expanded", String(willOpen));
            panel.setAttribute("aria-hidden", String(!willOpen));
          });
        });
      }

      function bindMenu() {
        const toggle = document.querySelector("[data-menu-toggle]");
        toggle.addEventListener("click", () => {
          const open = !document.body.classList.contains("menu-open");
          document.body.classList.toggle("menu-open", open);
          document.querySelector("[data-header]").classList.toggle("menu-visible", open);
          toggle.setAttribute("aria-expanded", String(open));
          toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
        });
        document.addEventListener("click", (event) => {
          if (event.target.closest("[data-menu-link]")) {
            document.body.classList.remove("menu-open");
            document.querySelector("[data-header]").classList.remove("menu-visible");
            toggle.setAttribute("aria-expanded", "false");
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && document.body.classList.contains("menu-open")) {
            document.body.classList.remove("menu-open");
            document.querySelector("[data-header]").classList.remove("menu-visible");
            toggle.setAttribute("aria-expanded", "false");
            toggle.focus();
          }
        });
      }

      function runTypingCycle() {
        window.clearTimeout(window.liveAssistTypingTimer);
        const question = t("overlayQuestion");
        const answerBlocks = [...document.querySelectorAll("[data-answer-block]")];
        const sourceLines = [...document.querySelectorAll("[data-source-line]")];
        let index = 0;
        typedNodes.forEach((node) => {
          node.textContent = "";
          node.classList.add("typing-caret");
        });
        answerBlocks.forEach((node) => node.classList.remove("is-visible"));
        sourceLines.forEach((node) => node.classList.remove("is-visible"));

        if (reducedMotion) {
          typedNodes.forEach((node) => {
            node.textContent = question;
            node.classList.remove("typing-caret");
          });
          answerBlocks.forEach((node) => node.classList.add("is-visible"));
          sourceLines.forEach((node) => node.classList.add("is-visible"));
          return;
        }

        const typeNext = () => {
          typedNodes.forEach((node) => {
            node.textContent = question.slice(0, index);
          });
          index += 1;
          if (index <= question.length) {
            window.liveAssistTypingTimer = window.setTimeout(typeNext, 34);
            return;
          }
          typedNodes.forEach((node) => node.classList.remove("typing-caret"));
          window.liveAssistTypingTimer = window.setTimeout(() => {
            answerBlocks.forEach((node) => node.classList.add("is-visible"));
            sourceLines.forEach((node) => node.classList.add("is-visible"));
          }, 420);
          window.liveAssistTypingTimer = window.setTimeout(runTypingCycle, 5000);
        };
        typeNext();
      }

      function renderStaticText() {
        document.documentElement.lang = currentLang;
        document.querySelector("[data-lang-toggle]").textContent = currentLang === "en" ? "RU" : "EN";
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          node.textContent = t(key);
        });
        document.querySelector("[data-email-input]").placeholder = t("emailPlaceholder");
      }

      function renderAll() {
        renderStaticText();
        renderNav();
        renderOverlays();
        renderFeatures();
        renderSteps();
        renderUseCases();
        renderPricing();
        renderFaq();
        bindFaq();
        observeReveals();
      }

      function observeReveals() {
        const items = document.querySelectorAll(".reveal");
        if (reducedMotion) {
          items.forEach((item) => item.classList.add("is-visible"));
          return;
        }
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });
        items.forEach((item) => observer.observe(item));
      }

      function updateHeader() {
        document.querySelector("[data-header]").classList.toggle("is-scrolled", window.scrollY > 16);
      }

      function updateScrolly() {
        const section = document.querySelector("[data-scrolly]");
        const rect = section.getBoundingClientRect();
        const total = section.offsetHeight - window.innerHeight;
        const progress = Math.min(1, Math.max(0, -rect.top / total));
        const nextStep = Math.min(4, Math.floor(progress * 5));
        if (nextStep !== activeStep) {
          activeStep = nextStep;
          document.querySelectorAll("[data-step]").forEach((step) => {
            step.classList.toggle("is-active", Number(step.getAttribute("data-step")) === activeStep);
          });
        }
      }

      function bindLanguageToggle() {
        document.querySelector("[data-lang-toggle]").addEventListener("click", () => {
          currentLang = currentLang === "en" ? "ru" : "en";
          localStorage.setItem("liveassist-lang", currentLang);
          renderAll();
        });
      }

      function bindForm() {
        const form = document.querySelector("[data-waitlist-form]");
        const input = document.querySelector("[data-email-input]");
        const message = document.querySelector("[data-form-message]");
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const valid = input.value.trim().includes("@") && input.value.trim().includes(".");
          message.classList.remove("is-error", "is-success");
          if (!valid) {
            input.setAttribute("aria-invalid", "true");
            message.textContent = t("emailError");
            message.classList.add("is-error");
            input.focus();
            return;
          }
          input.removeAttribute("aria-invalid");
          message.textContent = t("emailSuccess");
          message.classList.add("is-success");
        });
        input.addEventListener("input", () => {
          input.removeAttribute("aria-invalid");
          message.classList.remove("is-error", "is-success");
          message.textContent = t("ctaSub");
        });
      }

      window.addEventListener("scroll", () => {
        updateHeader();
        updateScrolly();
      }, { passive: true });

      document.querySelector('[data-icon="chat"]').innerHTML = icons.chat;
      renderAll();
      bindMenu();
      bindLanguageToggle();
      bindForm();
      updateHeader();
      updateScrolly();
    </script>
  </body>
</html>
